name = "test-watcher-noop-restore"
description = "Safe disconnect test recipe. Restores the test snapshot — no display changes if snapshot matches current state."
initial_mode = "MOBILE"
target_mode = "DESKTOP"

[[steps]]
id = "restore-test-snapshot"
ingredient = "display.snapshot"
operation = "reset"
depends_on = []
verify = false
compensation_policy = "none"

[steps.arguments]
snapshot_name = "watcher-live-test"
