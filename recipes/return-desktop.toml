name = "return-desktop"
description = "Restore the transient desktop snapshot captured before the mobile recipe ran."
initial_mode = "MOBILE"
target_mode = "DESKTOP"

[[steps]]
id = "restore-desktop-snapshot"
ingredient = "display.snapshot"
operation = "reset"
depends_on = []
verify = true
compensation_policy = "none"
retry_count = 0
retry_delay_ms = 0
allow_diagnostics = false

[steps.arguments]
snapshot_name = "desktop-pre-parsec"
