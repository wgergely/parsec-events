name = "resolution-readiness-blocks"
description = "Blocks dependent steps when set-resolution never reaches readiness."

[[steps]]
id = "set-resolution"
ingredient = "set-resolution"
verify = true
retry_count = 0
retry_delay_ms = 0

[steps.arguments]
width = 1280
height = 720

[[steps]]
id = "follow-up"
ingredient = "set-resolution"
depends_on = ["set-resolution"]
verify = true
retry_count = 0
retry_delay_ms = 0

[steps.arguments]
width = 1920
height = 1080
