required_backends = ["WindowAdapter"]
safety_class = "ReversibleUserInterfaceChange"
success_signals = []
failure_signals = []
wait_conditions = []

[operation_schemas.capture]
required = []

[operation_schemas.apply]
required = []
[operation_schemas.apply.types]
dwell_ms = "integer"
max_cycles = "integer"

[operation_schemas.verify]
required = []
[operation_schemas.verify.types]
captured_state = "hashtable"

[operation_schemas.reset]
required = []
[operation_schemas.reset.types]
captured_state = "hashtable"
