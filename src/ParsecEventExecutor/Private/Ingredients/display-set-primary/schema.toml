name = "display.set-primary"
kind = "display"
description = "Set the primary monitor."
capabilities = ["capture", "apply", "verify", "reset"]
required_backends = ["DisplayAdapter"]
safety_class = "ReversibleSystemChange"
success_signals = []
failure_signals = []
wait_conditions = []

[operation_schemas.capture]
required = []
[operation_schemas.capture.types]
device_name = "string"

[operation_schemas.apply]
required = ["device_name"]
[operation_schemas.apply.types]
device_name = "string"

[operation_schemas.verify]
required = ["device_name"]
[operation_schemas.verify.types]
device_name = "string"

[operation_schemas.reset]
required = []
[operation_schemas.reset.types]
device_name = "string"
captured_state = "hashtable"
